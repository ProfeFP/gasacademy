<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Confirmando...</title>
</head>
<body>
  <p id="msg">⏳ Procesando confirmación...</p>

  <script>
    const params = new URLSearchParams(window.location.search);
    const url = "https://script.google.com/macros/s/AKfycbw4B0R4lXF80LWxSdPezGY1kxoog4XjnNf0WMFpaOg2lQTsUWmSvuYDbScAt79X-S4Cog/exec?" 
                + params.toString();

    fetch(url, { mode: 'no-cors' })  // 👈 esto resuelve el error Android
      .then(() => {
        document.getElementById('msg').textContent = '✅ ¡Confirmado correctamente!';
      })
      .catch(() => {
        document.getElementById('msg').textContent = '❌ Error al confirmar. Inténtalo de nuevo.';
      });
  </script>
</body>
</html>
