<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Confirmant assistència...</title>
  <style>
    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
      background: #f3f4f6; display: flex; align-items: center; justify-content: center; 
      min-height: 100vh; margin: 0; padding: 20px; text-align: center; 
    }
    .card { background: white; padding: 32px 24px; border-radius: 16px; 
            box-shadow: 0 8px 20px rgba(0,0,0,0.08); max-width: 420px; width: 100%; }
    .icon { font-size: 48px; margin-bottom: 16px; }
    h1 { color: #1f2937; margin: 0 0 12px 0; font-size: 22px; }
    p { color: #4b5563; margin: 0 0 20px 0; line-height: 1.5; }
    .spinner { border: 3px solid #e5e7eb; border-top: 3px solid #f59e0b; 
               border-radius: 50%; width: 24px; height: 24px; animation: spin 0.8s linear infinite; 
               margin: 0 auto 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .hidden { display: none; }
    .btn { display: inline-block; background: #f59e0b; color: #000; 
           padding: 12px 28px; border-radius: 50px; text-decoration: none; 
           font-weight: 700; border: 2px solid #fbbf24; margin-top: 8px; }
  </style>
</head>
<body>
  <div class="card">
    <!-- Estat inicial -->
    <div id="loading">
      <div class="spinner"></div>
      <h1>Processant...</h1>
      <p>Si us plau, espera uns segons.</p>
    </div>

    <!-- Èxit -->
    <div id="success" class="hidden">
      <div class="icon">✅</div>
      <h1>Confirmació rebuda!</h1>
      <p id="msg">Gràcies per confirmar. Hem guardat la teva assistència correctament.</p>
      <a href="https://el-teu-web.com" class="btn" target="_blank">Tornar al web</a>
    </div>
  </div>

  <script>
    // ⚙️ CONFIGURACIÓ
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw4B0R4lXF80LWxSdPezGY1kxoog4XjnNf0WMFpaOg2lQTsUWmSvuYDbScAt79X-S4Cog/exec";
    
    const params = new URLSearchParams(window.location.search);
    const finalUrl = `${APPS_SCRIPT_URL}?${params.toString()}&accion=confirmar_url`;

    // 1️⃣ Mostra èxit immediatament (UX optimista)
    setTimeout(() => {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('success').classList.remove('hidden');
    }, 800); // Petit retard per semblar més natural

    // 2️⃣ Envia les dades a Google en segon pla (Fire & Forget)
    // `keepalive: true` garanteix que la petició es completi fins i tot si l'usuari tanca la pestanya
    if (navigator.sendBeacon) {
      // Mètode modern i més fiable per a Android/iOS
      const payload = new URLSearchParams();
      for (const [k, v] of params.entries()) payload.append(k, v);
      payload.append('accion', 'confirmar_url');
      
      navigator.sendBeacon(`${APPS_SCRIPT_URL}?accion=confirmar_url&${payload.toString()}`);
    } else {
      // Fallback per navegadors antics
      fetch(finalUrl, { method: 'GET', mode: 'no-cors', keepalive: true });
    }
  </script>
</body>
</html>
