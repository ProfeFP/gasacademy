<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Confirmant assistència...</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
           background: #f3f4f6; display: flex; align-items: center; justify-content: center; 
           min-height: 100vh; margin: 0; padding: 20px; text-align: center; }
    .card { background: white; padding: 30px 40px; border-radius: 16px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); max-width: 400px; width: 100%; }
    .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #f59e0b; 
               border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; 
               margin: 0 auto 20px; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .success { color: #059669; font-size: 48px; margin-bottom: 16px; }
    .error { color: #dc2626; font-size: 48px; margin-bottom: 16px; }
    h1 { margin: 0 0 12px 0; color: #1f2937; font-size: 22px; }
    p { margin: 0; color: #4b5563; line-height: 1.5; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="card">
    <!-- Estat: Carregant -->
    <div id="loading">
      <div class="spinner"></div>
      <h1>Processant...</h1>
      <p>Si us plau, espera mentre confirmem la teva assistència.</p>
    </div>

    <!-- Estat: Èxit -->
    <div id="success" class="hidden">
      <div class="success">✅</div>
      <h1>Confirmat!</h1>
      <p id="msg-success">Gràcies per confirmar. T'esperem!</p>
    </div>

    <!-- Estat: Error -->
    <div id="error" class="hidden">
      <div class="error">❌</div>
      <h1>Ha sorgit un error</h1>
      <p id="msg-error">No hem pogut processar la confirmació. Intenta-ho més tard.</p>
    </div>
  </div>

  <script>
    // ⚙️ CONFIGURACIÓ: Pega aquí la teva URL de Apps Script
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw4B0R4lXF80LWxSdPezGY1kxoog4XjnNf0WMFpaOg2lQTsUWmSvuYDbScAt79X-S4Cog/exec";

    // Recollim els paràmetres de la URL actual (ex: ?email=xxx&nombre=yyy)
    const params = new URLSearchParams(window.location.search);
    
    // Construïm la URL final afegint l'acció
    const finalUrl = `${APPS_SCRIPT_URL}?${params.toString()}&accion=confirmar_url`;

    async function confirmar() {
      try {
        // Fem la petició. NO fem servir 'no-cors' per poder llegir la resposta.
        const response = await fetch(finalUrl, { 
          method: 'GET',
          mode: 'cors' // Important per rebre la resposta JSON
        });
        
        const data = await response.json();
        
        if (data.status === "ok") {
          mostrarSuccess(data.nombre);
        } else {
          mostrarError("Resposta del servidor no vàlida.");
        }
      } catch (err) {
        console.error("Error fetch:", err);
        // Si falla CORS o xarxa, sovint caiem aquí
        mostrarError("Error de connexió. Revisa la consola (F12).");
      }
    }

    function mostrarSuccess(nom) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('success').classList.remove('hidden');
      if(nom) {
        document.getElementById('msg-success').textContent = `Gràcies, ${nom}! Confirmació rebuda.`;
      }
    }

    function mostrarError(detall) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('error').classList.remove('hidden');
      document.getElementById('msg-error').textContent = detall;
    }

    // Iniciar el procés en carregar la pàgina
    confirmar();
  </script>
</body>
</html>
