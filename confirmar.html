<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gràcies per confirmar!</title>
  <style>
    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
      background: #f3f4f6; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      min-height: 100vh; 
      margin: 0; 
      padding: 20px; 
      text-align: center; 
    }
    .card { 
      background: white; 
      padding: 40px; 
      border-radius: 16px; 
      box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
      max-width: 450px; 
      width: 100%; 
    }
    .icon { font-size: 56px; margin-bottom: 20px; }
    h1 { color: #1f2937; margin: 0 0 16px 0; font-size: 24px; }
    p { color: #4b5563; margin: 0 0 24px 0; line-height: 1.6; }
    .btn { 
      display: inline-block; 
      background: #f59e0b; 
      color: #000; 
      padding: 12px 28px; 
      border-radius: 50px; 
      text-decoration: none; 
      font-weight: 700; 
      border: 2px solid #fbbf24;
      transition: transform 0.1s;
    }
    .btn:hover { transform: scale(1.02); }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">✅</div>
    <h1>Confirmació rebuda!</h1>
    <p>Gràcies per confirmar la teva assistència. Hem guardat les teves dades correctament.</p>
    <p style="font-size:14px; color:#6b7280;">Rebràs un recordatori 24h abans de l'esdeveniment.</p>
    <a href="https://el-teu-web.com" class="btn" target="_blank">Tornar al web</a>
  </div>
</body>
</html>
