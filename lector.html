<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Confirmación de asistencia</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(145deg, #b8e1fc 0%, #d4f1ff 100%);
      font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(2px);
      border-radius: 48px;
      box-shadow: 0 20px 35px -12px rgba(0, 80, 120, 0.35);
      max-width: 520px;
      width: 100%;
      padding: 40px 32px;
      text-align: center;
      border: 1px solid rgba(70, 150, 230, 0.4);
      transition: all 0.2s ease;
    }

    .icon {
      background: #e3f2fd;
      width: 80px;
      height: 80px;
      border-radius: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      box-shadow: inset 0 0 0 2px white, 0 8px 20px rgba(0,0,0,0.05);
    }
    .icon span {
      font-size: 48px;
    }

    h1 {
      color: #0b4f6c;
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.3px;
      margin-bottom: 12px;
    }

    .mensaje {
      color: #1a5d7a;
      font-size: 1.1rem;
      line-height: 1.5;
      margin: 16px 0;
    }

    .datos {
      background: #eef5ff;
      border-left: 4px solid #3b82f6;
      border-radius: 24px;
      padding: 18px 20px;
      margin: 24px 0;
      color: #0a4b6e;
      font-weight: 500;
      text-align: left;
      font-size: 0.95rem;
    }

    .badge {
      background: #cbe4fe;
      display: inline-block;
      padding: 6px 14px;
      border-radius: 40px;
      font-size: 0.8rem;
      color: #035c8f;
      margin-top: 8px;
    }

    a {
      color: #1e6f9f;
      text-decoration: none;
      font-weight: 500;
      border-bottom: 1px dashed #7ab3c8;
    }

    .barra {
      height: 4px;
      background: linear-gradient(90deg, #61b0ff, #a0d4ff, #3b82f6);
      border-radius: 4px;
      margin-top: 32px;
      width: 100%;
    }

    /* Loader opcional mientras se envía */
    .loading-trace {
      font-size: 12px;
      color: #2273a7;
      margin-top: 16px;
      opacity: 0.8;
    }
  </style>
</head>
<body>
<div class="card">
  <div class="icon">
    <span>✅</span>
  </div>
  <h1>¡Gracias, <span id="nombreUsuario">estudiante</span>!</h1>
  <div class="mensaje">
    Tu asistencia al Curso de Nivel 2 ha quedado <strong> registrada</strong>.
  </div>
  <div class="datos">
    📅 Martes, 19 de mayo y Miercoles 20 de mayo  de 9h a 15h <br>
    🧾 Código de registro enviado a tu seguimiento.
  </div>
  <p style="font-size: 13px; color: #2c6e9e;">
    ¿Dudas? Escribe a <a href="mailto:profefp.tk@gmail.com">profefp.tk@gmail.com</a>
  </p>
  <div class="barra"></div>
  <div class="loading-trace" id="estadoEnvio">🔄 Registrando tu continuidad...</div>
</div>

<script>
  (function() {
    // 🔹 1. Obtener TODOS los parámetros de la URL actual (los que vienen del QR)
    const urlParams = new URLSearchParams(window.location.search);
    
    // Parámetros clave que esperamos: accion, id, nombre
    let accion = urlParams.get('accion') || 'seguir';
    let id = urlParams.get('id');
    let nombre = urlParams.get('nombre');
    
    // Mostrar el nombre en el título si existe
    if (nombre) {
      const nombreSpan = document.getElementById('nombreUsuario');
      if (nombreSpan) nombreSpan.innerText = decodeURIComponent(nombre);
    }
    
    // Validación mínima
    if (!id || !nombre) {
      document.getElementById('estadoEnvio').innerHTML = '⚠️ Faltan datos de identificación. Contacta con soporte.';
      console.warn('Faltan id o nombre', { id, nombre });
      return; // No intentamos enviar porque no tenemos los datos mínimos
    }
    
    // 🔹 2. URL de tu Google Apps Script (sin parámetros fijos)
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyHyczthY4wrlWKVXtn5NqlpZq4v29sEJYI2-fAzUglsWKPuRzSjt1XmbBFjWxKcAyVpQ/exec";
    
    // 🔹 3. Construir los parámetros que queremos enviar a Google
    //    - Mantenemos la misma 'accion' que vino (o forzamos 'confirmar_url' si prefieres)
    //    - Enviamos id, nombre y cualquier otro que pueda ser útil
    const paramsToSend = new URLSearchParams();
    paramsToSend.set('accion', 'confirmar_url');   // puedes cambiarlo a accion original: paramsToSend.set('accion', accion)
    if (id) paramsToSend.set('id', id);
    if (nombre) paramsToSend.set('nombre', nombre);
    
    // Opcional: añadir timestamp para evitar caché
    paramsToSend.set('t', Date.now());
    
    const urlDestino = `${APPS_SCRIPT_URL}?${paramsToSend.toString()}`;
    
    // 🔹 4. Enviar la notificación a Google Script de forma fiable
    //    - Usamos fetch con mode 'no-cors' porque el script responde con un HTML (no necesitamos leer respuesta)
    //    - Agregamos 'keepalive: true' para que termine aunque se cierre la página
    fetch(urlDestino, {
      method: 'GET',        // Google Apps Script acepta GET con parámetros en URL
      mode: 'no-cors',      // Evita errores de CORS, pero no podemos leer la respuesta (no importa)
      keepalive: true,
      cache: 'no-store'
    }).then(() => {
      // El envío se completó (aunque no sepamos el resultado exacto, el servidor de Google lo recibió)
      document.getElementById('estadoEnvio').innerHTML = '✅ Registro guardado correctamente.';
      setTimeout(() => {
        const elem = document.getElementById('estadoEnvio');
        if (elem) elem.style.opacity = '0.6';
      }, 3000);
    }).catch(err => {
      console.error('Error al notificar a Google:', err);
      document.getElementById('estadoEnvio').innerHTML = '⚠️ No se pudo confirmar automáticamente, pero tu asistencia queda anotada localmente.';
    });
    
    // También como respaldo (sendBeacon si el navegador está por cerrarse)
    if (navigator.sendBeacon) {
      // sendBeacon funciona mejor con POST, pero nuestra API espera GET. 
      // No obstante, podemos llamar a fetch igual; sendBeacon no es necesario aquí.
      // Solo lo mencionamos como mejora extra: realizamos un segundo envío silencioso con keepalive
      const beaconUrl = `${APPS_SCRIPT_URL}?${paramsToSend.toString()}&beacon=1`;
      navigator.sendBeacon(beaconUrl);
    }
  })();
</script>
</body>
</html>
