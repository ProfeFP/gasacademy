<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Confirmación de asistencia</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(145deg, #b8e1fc 0%, #d4f1ff 100%);
      font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(2px);
      border-radius: 48px;
      box-shadow: 0 20px 35px -12px rgba(0, 80, 120, 0.35);
      max-width: 520px;
      width: 100%;
      padding: 40px 32px;
      text-align: center;
      border: 1px solid rgba(70, 150, 230, 0.4);
      transition: all 0.2s ease;
    }

    .icon {
      background: #e3f2fd;
      width: 80px;
      height: 80px;
      border-radius: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      box-shadow: inset 0 0 0 2px white, 0 8px 20px rgba(0,0,0,0.05);
    }
    .icon span {
      font-size: 48px;
    }

    h1 {
      color: #0b4f6c;
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.3px;
      margin-bottom: 12px;
    }

    .mensaje {
      color: #1a5d7a;
      font-size: 1.1rem;
      line-height: 1.5;
      margin: 16px 0;
    }

    .datos {
      background: #eef5ff;
      border-left: 4px solid #3b82f6;
      border-radius: 24px;
      padding: 18px 20px;
      margin: 24px 0;
      color: #0a4b6e;
      font-weight: 500;
      text-align: left;
      font-size: 0.95rem;
    }

    .badge {
      background: #cbe4fe;
      display: inline-block;
      padding: 6px 14px;
      border-radius: 40px;
      font-size: 0.8rem;
      color: #035c8f;
      margin-top: 8px;
    }

    a {
      color: #1e6f9f;
      text-decoration: none;
      font-weight: 500;
      border-bottom: 1px dashed #7ab3c8;
    }

    .barra {
      height: 4px;
      background: linear-gradient(90deg, #61b0ff, #a0d4ff, #3b82f6);
      border-radius: 4px;
      margin-top: 32px;
      width: 100%;
    }

    .loading-trace {
      font-size: 12px;
      color: #2273a7;
      margin-top: 16px;
      opacity: 0.8;
    }

    /* NUEVO ESTILO PARA EL BOTÓN */
    .btn-curso {
      display: inline-block;
      background: linear-gradient(105deg, #2b6cb0, #3182ce);
      color: white;
      font-weight: 600;
      font-size: 1rem;
      padding: 12px 28px;
      border-radius: 40px;
      text-decoration: none;
      margin-top: 28px;
      margin-bottom: 8px;
      box-shadow: 0 4px 12px rgba(49, 130, 206, 0.3);
      transition: all 0.2s ease;
      border: none;
      cursor: pointer;
    }
    .btn-curso:hover {
      background: linear-gradient(105deg, #2c5282, #2b6cb0);
      transform: scale(1.02);
      box-shadow: 0 8px 18px rgba(49, 130, 206, 0.4);
    }
    .btn-curso:active {
      transform: scale(0.98);
    }
  </style>
</head>
<body>
<div class="card">
  <div class="icon">
    <span>✅</span>
  </div>
  <h1>¡Gracias, <span id="nombreUsuario">estudiante</span>!</h1>
  <div class="mensaje">
    Tu asistencia al Curso de Nivel 2 ha quedado <strong> registrada</strong>.
  </div>
  <div class="datos">
    📅 Martes 19 y Miercoles 20 de Mayo de 9h a 15h <br>
    🧾 Código de registro enviado a tu seguimiento.
  </div>
  <p style="font-size: 13px; color: #2c6e9e;">
    ¿Dudas? Escribe a <a href="mailto:profefpconia@gmail.com">profefpconia@gmail.com</a>
  </p>
  
  <!-- BOTÓN CENTRADO -->
  <div style="text-align: center;">
    <a href="URL_DEL_CURSO_SIN_PARAMETROS" class="btn-curso">
      🚀 Acceder al curso de nivel 2
    </a>
  </div>
  
  <div class="barra"></div>
  <div class="loading-trace" id="estadoEnvio">🔄 Registrando tu continuidad...</div>
</div>

<script>
  (function() {
    // Parámetros de la URL
    const urlParams = new URLSearchParams(window.location.search);
    let accion = urlParams.get('accion') || 'seguir';
    let id = urlParams.get('id');
    let nombre = urlParams.get('nombre');
    
    if (nombre) {
      const nombreSpan = document.getElementById('nombreUsuario');
      if (nombreSpan) nombreSpan.innerText = decodeURIComponent(nombre);
    }
    
    if (!id || !nombre) {
      document.getElementById('estadoEnvio').innerHTML = '⚠️ Faltan datos de identificación. Contacta con soporte.';
      console.warn('Faltan id o nombre', { id, nombre });
      return;
    }
    
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyHyczthY4wrlWKVXtn5NqlpZq4v29sEJYI2-fAzUglsWKPuRzSjt1XmbBFjWxKcAyVpQ/exec";
    
    const paramsToSend = new URLSearchParams();
    paramsToSend.set('accion', accion);      // AHORA RESPETA EL VALOR ORIGINAL
    if (id) paramsToSend.set('id', id);
    if (nombre) paramsToSend.set('nombre', nombre);
    paramsToSend.set('t', Date.now());
    
    const urlDestino = `${APPS_SCRIPT_URL}?${paramsToSend.toString()}`;
    
    // Envío a Google
    fetch(urlDestino, {
      method: 'GET',
      mode: 'no-cors',
      keepalive: true,
      cache: 'no-store'
    }).then(() => {
      document.getElementById('estadoEnvio').innerHTML = '✅ Registro guardado correctamente.';
      setTimeout(() => {
        const elem = document.getElementById('estadoEnvio');
        if (elem) elem.style.opacity = '0.6';
      }, 3000);
    }).catch(err => {
      console.error('Error al notificar a Google:', err);
      document.getElementById('estadoEnvio').innerHTML = '⚠️ No se pudo confirmar automáticamente, pero tu asistencia queda anotada localmente.';
    });
    
    // Beacon de respaldo
   
    }
  })();
</script>
</body>
</html>
