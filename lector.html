<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Confirmación de asistencia</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(145deg, #b8e1fc 0%, #d4f1ff 100%);
      font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(2px);
      border-radius: 48px;
      box-shadow: 0 20px 35px -12px rgba(0, 80, 120, 0.35);
      max-width: 520px;
      width: 100%;
      padding: 40px 32px;
      text-align: center;
      border: 1px solid rgba(70, 150, 230, 0.4);
      transition: all 0.2s ease;
    }

    .icon {
      background: #e3f2fd;
      width: 80px;
      height: 80px;
      border-radius: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      box-shadow: inset 0 0 0 2px white, 0 8px 20px rgba(0,0,0,0.05);
    }
    .icon span {
      font-size: 48px;
    }

    h1 {
      color: #0b4f6c;
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.3px;
      margin-bottom: 12px;
    }

    .mensaje {
      color: #1a5d7a;
      font-size: 1.1rem;
      line-height: 1.5;
      margin: 16px 0;
    }

    .datos {
      background: #eef5ff;
      border-left: 4px solid #3b82f6;
      border-radius: 24px;
      padding: 18px 20px;
      margin: 24px 0;
      color: #0a4b6e;
      font-weight: 500;
      text-align: left;
      font-size: 0.95rem;
    }

    a {
      color: #1e6f9f;
      text-decoration: none;
      font-weight: 500;
      border-bottom: 1px dashed #7ab3c8;
    }

    .barra {
      height: 4px;
      background: linear-gradient(90deg, #61b0ff, #a0d4ff, #3b82f6);
      border-radius: 4px;
      margin-top: 32px;
      width: 100%;
    }

    .loading-trace {
      font-size: 12px;
      color: #2273a7;
      margin-top: 16px;
      opacity: 0.8;
    }

    /* Botón corregido */
    .btn-curso {
      display: inline-block;
      background: linear-gradient(105deg, #2b6cb0, #3182ce);
      color: white;
      font-weight: 600;
      font-size: 1rem;
      padding: 12px 28px;
      border-radius: 40px;
      text-decoration: none;
      margin-top: 28px;
      margin-bottom: 8px;
      box-shadow: 0 4px 12px rgba(49, 130, 206, 0.3);
      transition: all 0.2s ease;
      border: none;
      cursor: pointer;
    }
    .btn-curso:hover {
      background: linear-gradient(105deg, #2c5282, #2b6cb0);
      transform: scale(1.02);
      box-shadow: 0 8px 18px rgba(49, 130, 206, 0.4);
    }
    .btn-curso:active {
      transform: scale(0.98);
    }
  </style>
</head>
<body>
<div class="card">
  <div class="icon">
    <span>✅</span>
  </div>
  <h1>¡Gracias, <span id="nombreUsuario">estudiante</span>!</h1>
  <div class="mensaje">
    Tu asistencia al  <strong>Curso de Nivel 2 <strong> taller ha quedado <strong>registrada </strong>.
  </div>
  <div class="datos">
    📅 Martes dia 19 y Miercoles dia 20 de Mayo de 9h a 15h <br>
    🧾 Código de registro enviado a tu seguimiento.
  </div>
  <p style="font-size: 13px; color: #2c6e9e;">
    ¿Dudas? Escribe a <a href="mailto:profefpconia@gmail.com">profefpconia@gmail.com</a>
  </p>
  
  <!-- El botón se generará dinámicamente con JavaScript para asegurar la URL correcta -->
  <div style="text-align: center;" id="botonContainer"></div>
  
  <div class="barra"></div>
  <div class="loading-trace" id="estadoEnvio">🔄 Registrando tu continuidad...</div>
</div>

<script>
  (function() {
    // ============================================================
    // 1. CONFIGURACIÓN
    // ============================================================
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyHyczthY4wrlWKVXtn5NqlpZq4v29sEJYI2-fAzUglsWKPuRzSjt1XmbBFjWxKcAyVpQ/exec";
    
    // ============================================================
    // 2. LEER PARÁMETROS DE LA URL (compatible con "nombre" o "nombre2")
    // ============================================================
    const urlParams = new URLSearchParams(window.location.search);
    let accion = urlParams.get('accion') || 'seguir';
    let id = urlParams.get('id');
    // Priorizar "nombre2" si existe, si no, usar "nombre"
    let nombre = urlParams.get('nombre2') || urlParams.get('nombre');
    
    // Mostrar el nombre en el saludo (si no hay, muestra "estudiante")
    const nombreSpan = document.getElementById('nombreUsuario');
    if (nombreSpan) {
      if (nombre) {
        nombreSpan.innerText = decodeURIComponent(nombre);
      } else {
        nombreSpan.innerText = "estudiante";
      }
    }
    
    // Validar que tenemos id (opcionalmente nombre, pero al menos id)
    if (!id) {
      document.getElementById('estadoEnvio').innerHTML = '⚠️ Falta el identificador del estudiante. Contacta con soporte.';
      console.warn('Falta el parámetro id');
      // Aún así mostramos el botón, pero no enviamos notificación
    }
    
    // ============================================================
    // 3. GENERAR EL BOTÓN CON LA URL BASE (SIN PARÁMETROS)
    // ============================================================
    const botonContainer = document.getElementById('botonContainer');
    if (botonContainer) {
      // Creamos el enlace con la URL base del script (sin query string)
      const enlace = document.createElement('a');
      enlace.href = APPS_SCRIPT_URL;   // URL limpia, sin ningún parámetro
      enlace.className = 'btn-curso';
      enlace.innerText = '🚀 Acceder al curso de nivel 2';
      // Opcional: abrir en nueva pestaña (si quieres)
      // enlace.target = '_blank';
      botonContainer.appendChild(enlace);
    }
    
    // ============================================================
    // 4. ENVIAR NOTIFICACIÓN A GOOGLE APPS SCRIPT (solo si tenemos id)
    // ============================================================
    if (!id) {
      // Si no hay id, no enviamos nada
      return;
    }
    
    // Construir los parámetros a enviar (respetando accion, id y nombre)
    const paramsToSend = new URLSearchParams();
    paramsToSend.set('accion', accion);
    paramsToSend.set('id', id);
    if (nombre) paramsToSend.set('nombre', nombre);
    paramsToSend.set('t', Date.now()); // evitar caché
    
    const urlDestino = `${APPS_SCRIPT_URL}?${paramsToSend.toString()}`;
    
    // Envío con fetch (mode no-cors, keepalive)
    fetch(urlDestino, {
      method: 'GET',
      mode: 'no-cors',
      keepalive: true,
      cache: 'no-store'
    }).then(() => {
      document.getElementById('estadoEnvio').innerHTML = '✅ Registro guardado correctamente.';
      setTimeout(() => {
        const elem = document.getElementById('estadoEnvio');
        if (elem) elem.style.opacity = '0.6';
      }, 3000);
    }).catch(err => {
      console.error('Error al notificar a Google:', err);
      document.getElementById('estadoEnvio').innerHTML = '⚠️ No se pudo confirmar automáticamente, pero tu asistencia queda anotada localmente.';
    });
    /*
    // Beacon de respaldo (solo si sendBeacon está disponible)
    if (navigator.sendBeacon) {
      const beaconUrl = `${APPS_SCRIPT_URL}?${paramsToSend.toString()}&beacon=1`;
      navigator.sendBeacon(beaconUrl);
    }
    */
    
  })();
</script>
</body>
</html>
