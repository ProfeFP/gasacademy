<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Confirmación de asistencia</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(145deg, #b8e1fc 0%, #d4f1ff 100%);
      font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(2px);
      border-radius: 48px;
      box-shadow: 0 20px 35px -12px rgba(0, 80, 120, 0.35);
      max-width: 600px;
      width: 100%;
      padding: 40px 32px;
      text-align: center;
      border: 1px solid rgba(70, 150, 230, 0.4);
      transition: all 0.2s ease;
    }

    .icon {
      background: #e3f2fd;
      width: 80px;
      height: 80px;
      border-radius: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      box-shadow: inset 0 0 0 2px white, 0 8px 20px rgba(0,0,0,0.05);
    }
    .icon span {
      font-size: 48px;
    }

    h1 {
      color: #0b4f6c;
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.3px;
      margin-bottom: 12px;
    }

    .mensaje {
      color: #1a5d7a;
      font-size: 1.1rem;
      line-height: 1.5;
      margin: 16px 0;
    }

    .datos {
      background: #eef5ff;
      border-left: 4px solid #3b82f6;
      border-radius: 24px;
      padding: 18px 20px;
      margin: 24px 0;
      color: #0a4b6e;
      font-weight: 500;
      text-align: left;
      font-size: 0.95rem;
    }

    .badge {
      background: #cbe4fe;
      display: inline-block;
      padding: 6px 14px;
      border-radius: 40px;
      font-size: 0.8rem;
      color: #035c8f;
      margin-top: 8px;
    }

    a {
      color: #1e6f9f;
      text-decoration: none;
      font-weight: 500;
      border-bottom: 1px dashed #7ab3c8;
    }

    .barra {
      height: 4px;
      background: linear-gradient(90deg, #61b0ff, #a0d4ff, #3b82f6);
      border-radius: 4px;
      margin-top: 32px;
      width: 100%;
    }

    .loading-trace {
      font-size: 12px;
      color: #2273a7;
      margin-top: 16px;
      opacity: 0.8;
    }
    
    /* Área de depuración (solo para pruebas) */
    .debug {
      background: #f0f4fa;
      border-radius: 16px;
      padding: 12px;
      margin-top: 20px;
      text-align: left;
      font-family: monospace;
      font-size: 11px;
      color: #0a2e4a;
      border: 1px solid #c0d4f0;
      word-break: break-all;
    }
    .debug summary {
      cursor: pointer;
      font-weight: bold;
      color: #1e6f9f;
    }
  </style>
</head>
<body>
<div class="card">
  <div class="icon">
    <span>✅</span>
  </div>
  <h1>¡Gracias, <span id="nombreUsuario">estudiante</span>!</h1>
  <div class="mensaje">
    Tu asistencia al taller ha quedado <strong>confirmada</strong>.
  </div>
  <div class="datos">
    📅 Lunes, 20 de abril de 2026 — 17:00 a 18:00 h<br>
    🧾 Código de registro enviado a tu seguimiento.
  </div>
  <p style="font-size: 13px; color: #2c6e9e;">
    ¿Dudas? Escribe a <a href="mailto:profefpconia@gmail.com">profefpconia@gmail.com</a>
  </p>
  <div class="barra"></div>
  <div class="loading-trace" id="estadoEnvio">🔄 Registrando tu continuidad...</div>
  
  <!-- Área de depuración: muestra la URL y resultado -->
  <details class="debug">
    <summary>🔧 Depuración técnica (ver URL enviada)</summary>
    <div id="debugUrl"></div>
    <div id="debugResultado"></div>
  </details>
</div>

<script>
  (function() {
    // Elementos de depuración
    const debugUrlElem = document.getElementById('debugUrl');
    const debugResultadoElem = document.getElementById('debugResultado');
    const estadoElem = document.getElementById('estadoEnvio');
    
    // 🔹 1. Obtener TODOS los parámetros de la URL actual (los que vienen del QR)
    const urlParams = new URLSearchParams(window.location.search);
    
    // Parámetros clave que esperamos: accion, id, nombre
    let accion = urlParams.get('accion') || 'seguir';
    let id = urlParams.get('id');
    let nombre = urlParams.get('nombre');
    
    // Mostrar el nombre en el título si existe
    if (nombre) {
      const nombreSpan = document.getElementById('nombreUsuario');
      if (nombreSpan) nombreSpan.innerText = decodeURIComponent(nombre);
    }
    
    // Validación mínima
    if (!id || !nombre) {
      estadoElem.innerHTML = '⚠️ Faltan datos de identificación. Contacta con soporte.';
      if (debugResultadoElem) debugResultadoElem.innerText = '❌ Error: no se encontraron parámetros "id" y/o "nombre" en la URL.';
      console.warn('Faltan id o nombre', { id, nombre });
      return; // No intentamos enviar porque no tenemos los datos mínimos
    }
    
    // 🔹 2. URL de tu Google Apps Script (sin parámetros fijos)
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyHyczthY4wrlWKVXtn5NqlpZq4v29sEJYI2-fAzUglsWKPuRzSjt1XmbBFjWxKcAyVpQ/exec";
    
    // 🔹 3. Construir los parámetros que queremos enviar a Google
    const paramsToSend = new URLSearchParams();
    paramsToSend.set('accion', 'confirmar_url');   // o podrías usar accion original: paramsToSend.set('accion', accion)
    if (id) paramsToSend.set('id', id);
    if (nombre) paramsToSend.set('nombre', nombre);
    // Opcional: añadir timestamp para evitar caché
    paramsToSend.set('t', Date.now());
    
    const urlDestino = `${APPS_SCRIPT_URL}?${paramsToSend.toString()}`;
    
    // Mostrar la URL en el área de depuración
    if (debugUrlElem) {
      debugUrlElem.innerHTML = `<strong>📡 URL enviada a Google:</strong><br><code>${escapeHtml(urlDestino)}</code>`;
    }
    
    // 🔹 4. Enviar la notificación a Google Script de forma fiable
    estadoElem.innerHTML = '🔄 Enviando petición a Google...';
    
    // Usamos fetch para poder capturar errores y saber si la petición se completa
    fetch(urlDestino, {
      method: 'GET',
      mode: 'no-cors',   // No podemos leer la respuesta pero evitamos errores CORS
      keepalive: true,
      cache: 'no-store'
    })
    .then(() => {
      // Con 'no-cors', fetch siempre resuelve exitosamente aunque el servidor devuelva error,
      // porque no podemos ver el estado HTTP. Asumimos que se envió.
      estadoElem.innerHTML = '✅ Petición enviada (modo no-cors, se asume éxito).';
      if (debugResultadoElem) {
        debugResultadoElem.innerHTML = '✅ Fetch completado. No se puede leer la respuesta debido a mode "no-cors", pero la solicitud llegó al servidor.';
      }
    })
    .catch(err => {
      console.error('Error en fetch:', err);
      estadoElem.innerHTML = '⚠️ Error al conectar con Google. Revisa consola.';
      if (debugResultadoElem) {
        debugResultadoElem.innerHTML = `❌ Error en fetch: ${err.toString()}`;
      }
    });
    
    // También intentamos sendBeacon como respaldo (opcional)
    if (navigator.sendBeacon) {
      const beaconUrl = `${APPS_SCRIPT_URL}?${paramsToSend.toString()}&beacon=1`;
      const beaconSent = navigator.sendBeacon(beaconUrl);
      if (debugResultadoElem) {
        debugResultadoElem.innerHTML += `<br>📡 sendBeacon: ${beaconSent ? 'enviado' : 'falló'}`;
      }
    }
    
    // Helper para escapar HTML en depuración
    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
      }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
        return c;
      });
    }
  })();
</script>
</body>
</html>
